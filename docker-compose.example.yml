services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: claims_db
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - claims-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0
    container_name: redis-claims
    ports:
      - "6380:6379"
    networks:
      - claims-network

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - claims-network

  user-management:
    image: user-management:latest
    container_name: user-management
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis-claims
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: your_jwt_secret_here
      INTERNAL_API_KEY: your_internal_api_key_here
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - claims-network

  ai-claims-service:
    build:
      context: ./ai-claims-service
      dockerfile: Dockerfile
    container_name: ai-claims-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/claims_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis-claims
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      USER_MANAGEMENT_SERVICE_URL: http://user-management:8081
      GROQ_API_KEY: your_groq_api_key_here
      GROQ_API_URL: https://api.groq.com/openai/v1/chat/completions
      GROQ_MODEL: llama-3.3-70b-versatile
      JWT_SECRET: your_jwt_secret_here
      INTERNAL_API_KEY: your_internal_api_key_here
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
      user-management:
        condition: service_started
    networks:
      - claims-network

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started
    networks:
      - claims-network

volumes:
  mysql-data:

networks:
  claims-network:
    driver: bridge